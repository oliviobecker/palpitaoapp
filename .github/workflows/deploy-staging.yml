name: Build and deploy on IIS Staging

# Auto-deploys to the staging/test environment on every push to main (i.e. after a
# PR is merged). Production is manual — see deploy-iis.yml. Configure the staging
# target with repo/environment Variables and the `staging` environment Secrets
# (see the names referenced below).
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-iis-staging
  cancel-in-progress: false

env:
  FRONTEND_IIS_PATH: ${{ vars.STAGING_FRONTEND_IIS_PATH || 'C:\inetpub\palpitao-staging' }}
  BACKEND_IIS_PATH: ${{ vars.STAGING_BACKEND_IIS_PATH || 'C:\inetpub\palpitao-staging\api' }}
  BACKEND_APP_POOL: ${{ vars.STAGING_BACKEND_APP_POOL || 'palpitao-staging-api' }}

jobs:
  build-and-deploy:
    name: Build and deploy on IIS Staging
    runs-on: [self-hosted]
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the version footer can read git describe

      - name: Show tool versions
        shell: pwsh
        run: |
          Write-Host '--- MSBuild/DOTNET/VS environment ---'
          Get-ChildItem Env: |
            Where-Object { $_.Name -match 'MSBUILD|DOTNET|VSINSTALL|VCINSTALL|NETSDK' } |
            Sort-Object Name |
            Format-Table -AutoSize -Wrap
          Write-Host '--- SDKs ---'
          dotnet --list-sdks
          dotnet --info
          node --version
          npm --version

      - name: Restore backend
        run: dotnet restore backend/Palpitao.slnx

      - name: Test backend
        run: dotnet test backend/Palpitao.slnx --configuration Release --no-restore

      - name: Publish backend
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "${{ runner.temp }}\palpitao-staging-api"
          dotnet publish backend/src/Palpitao.Api/Palpitao.Api.csproj --configuration Release --output "${{ runner.temp }}\palpitao-staging-api" --no-restore

      - name: Write backend staging settings
        shell: pwsh
        # Secrets come from the `staging` environment (job-level environment: staging),
        # so they use the same names as production — the environment scopes them.
        env:
          BACKEND_CONNECTION_STRING: ${{ secrets.BACKEND_CONNECTION_STRING }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          $settings = @{
            ConnectionStrings = @{
              DefaultConnection = $env:BACKEND_CONNECTION_STRING
            }
            Jwt = @{
              Issuer = $env:JWT_ISSUER
              Audience = $env:JWT_AUDIENCE
              Key = $env:JWT_KEY
            }
            Sentry = @{
              # Empty/unset keeps Sentry off in staging; set the SENTRY_DSN secret in
              # the staging environment to enable it.
              Dsn = $env:SENTRY_DSN
              Environment = 'Staging'
            }
          }

          $missing = @()
          if ([string]::IsNullOrWhiteSpace($settings.ConnectionStrings.DefaultConnection)) { $missing += 'BACKEND_CONNECTION_STRING (staging env)' }
          if ([string]::IsNullOrWhiteSpace($settings.Jwt.Issuer)) { $missing += 'JWT_ISSUER (staging env)' }
          if ([string]::IsNullOrWhiteSpace($settings.Jwt.Audience)) { $missing += 'JWT_AUDIENCE (staging env)' }
          if ([string]::IsNullOrWhiteSpace($settings.Jwt.Key)) { $missing += 'JWT_KEY (staging env)' }
          if ($missing.Count -gt 0) {
            throw "Missing required GitHub secret(s): $($missing -join ', ')"
          }

          $settings |
            ConvertTo-Json -Depth 5 |
            Set-Content -Path "${{ runner.temp }}\palpitao-staging-api\appsettings.Staging.json" -Encoding UTF8

      - name: Set ASPNETCORE_ENVIRONMENT=Staging in web.config
        shell: pwsh
        run: |
          $webConfig = "${{ runner.temp }}\palpitao-staging-api\web.config"
          [xml]$xml = Get-Content $webConfig -Raw
          # The publish-generated web.config nests <system.webServer> inside a
          # <location> element, so navigate with XPath (//aspNetCore) to find the
          # node regardless of where it sits.
          $aspNetCore = $xml.SelectSingleNode('//aspNetCore')
          if ($null -eq $aspNetCore) {
            throw 'web.config has no <aspNetCore> element — cannot set ASPNETCORE_ENVIRONMENT.'
          }
          $envVars = $aspNetCore.SelectSingleNode('environmentVariables')
          if ($null -eq $envVars) {
            $envVars = $aspNetCore.AppendChild($xml.CreateElement('environmentVariables'))
          }
          $envVar = $envVars.SelectSingleNode("environmentVariable[@name='ASPNETCORE_ENVIRONMENT']")
          if ($null -eq $envVar) {
            $envVar = $envVars.AppendChild($xml.CreateElement('environmentVariable'))
            $envVar.SetAttribute('name', 'ASPNETCORE_ENVIRONMENT')
          }
          $envVar.SetAttribute('value', 'Staging')
          $xml.Save($webConfig)

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Deploy backend to IIS
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.BACKEND_IIS_PATH }}" | Out-Null

          New-Item -ItemType File -Force -Path "${{ env.BACKEND_IIS_PATH }}\app_offline.htm" | Out-Null

          # Reinforcement (best-effort): stop the app pool so no w3wp worker can hold the DLLs.
          # app_offline.htm already unloads the app; stopping the pool just guarantees the locks
          # are gone even if shutdown is slow. Reading IIS config needs admin rights, so if that
          # fails (e.g. the runner service isn't elevated) we WARN and keep going on app_offline.
          $pool = "${{ env.BACKEND_APP_POOL }}"
          try {
            Import-Module WebAdministration -ErrorAction Stop
            if (Test-Path "IIS:\AppPools\$pool") {
              if ((Get-WebAppPoolState -Name $pool).Value -ne 'Stopped') {
                Stop-WebAppPool -Name $pool
              }
              # Wait until the pool is fully stopped (workers exited) before copying.
              $deadline = (Get-Date).AddSeconds(30)
              while ((Get-WebAppPoolState -Name $pool).Value -ne 'Stopped' -and (Get-Date) -lt $deadline) {
                Start-Sleep -Seconds 1
              }
            } else {
              Write-Host "App pool '$pool' not found; relying on app_offline.htm only."
            }
          } catch {
            Write-Host "::warning::Could not stop app pool '$pool' ($($_.Exception.Message)). Relying on app_offline.htm only."
          }

          # Give the ASP.NET Core Module time to unload the app and release the DLL locks.
          Start-Sleep -Seconds 5

          # /XF app_offline.htm keeps the offline file in place for the WHOLE copy: with /MIR
          # (= /E /PURGE) robocopy would otherwise delete it as an "extra" file, bringing the
          # app back online mid-copy and re-locking Palpitao.Api.dll. /R:/W: avoid the
          # default million-retry/30s-wait hang if a file is still briefly locked.
          robocopy "${{ runner.temp }}\palpitao-staging-api" "${{ env.BACKEND_IIS_PATH }}" /MIR /XD logs /XF app_offline.htm /R:10 /W:3
          $robocopyExitCode = $LASTEXITCODE
          if ($robocopyExitCode -gt 7) {
            throw "Backend robocopy failed with exit code $robocopyExitCode"
          }
          $global:LASTEXITCODE = 0

          Remove-Item -Force -ErrorAction SilentlyContinue "${{ env.BACKEND_IIS_PATH }}\app_offline.htm"

          # Bring the app pool back online (best-effort; no-op if we never stopped it).
          try {
            if (Test-Path "IIS:\AppPools\$pool") {
              if ((Get-WebAppPoolState -Name $pool).Value -ne 'Started') {
                Start-WebAppPool -Name $pool
              }
            }
          } catch {
            Write-Host "::warning::Could not start app pool '$pool' ($($_.Exception.Message))."
          }

      - name: Deploy frontend to IIS
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.FRONTEND_IIS_PATH }}" | Out-Null

          robocopy "frontend\dist\palpitao\browser" "${{ env.FRONTEND_IIS_PATH }}" /MIR /XD api
          $robocopyExitCode = $LASTEXITCODE
          if ($robocopyExitCode -gt 7) {
            throw "Frontend robocopy failed with exit code $robocopyExitCode"
          }
          $global:LASTEXITCODE = 0
