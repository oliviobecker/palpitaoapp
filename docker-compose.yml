# ---------------------------------------------------------------------------
# Local PostgreSQL for development. Copy .env.example to .env to override the
# defaults below. The backend connection string (appsettings.json) points at
# Host=localhost;Port=5432;Database=palpitao;Username=palpitao;Password=palpitao.
#
#   cp .env.example .env
#   docker compose up -d
# ---------------------------------------------------------------------------
services:
  postgres:
    image: postgres:16
    container_name: palpitao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-palpitao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-palpitao}
      POSTGRES_DB: ${POSTGRES_DB:-palpitao}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - palpitao-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-palpitao} -d ${POSTGRES_DB:-palpitao}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  palpitao-pgdata:
